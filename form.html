<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="User feedback form for the WDD230 course.">
    <meta name="author" content="Danny M. Rausseo L.">
    <title>Form - WDD230 Course</title>
    <link rel="icon" href="path/to/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/larger.css" media="screen and (min-width: 768px)">
    <link rel="stylesheet" href="styles/form.css">
</head>
<body>
    <header>
        <h1>City Chamber of Commerce of São Paulo City</h1>
        <nav>
            <button class="hamburger">&#9776;</button>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="chamber/join.html">Join</a></li>
                
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <h2>User Feedback Form</h2>
            <form method="get" action="record.html">
                <label for="username">Username:
                    <input type="text" id="username" name="username" required>
                </label>
                <label for="password">Password:
                    <input type="password" id="password" name="password" required pattern="[A-Za-z0-9]{8,}" title="Password must be at least 8 characters long and can only contain alphanumeric characters.">
                </label>
                <label for="confirm-password">Confirm Password:
                    <input type="password" id="confirm-password" name="confirm-password" required>
                </label>
                <label for="email">Email:
                    <input type="email" id="email" name="email" required pattern="[a-zA-Z0-9._%+-]+@byui\.edu$" title="Please enter a valid email address ending with @byui.edu">
                </label>
                <label for="rating">Page Rating:</label>
                <input type="range" id="rating" name="rating" min="1" max="10" step="1" value="5" oninput="document.getElementById('ratingOutput').value = this.value">
                <output id="ratingOutput" for="rating">5</output>
                <input type="submit" value="Submit Feedback">
            </form>
        </section>
    </main>
    <footer>
        <p>Contact Information: [rau23003@byui.edu]</p>
        <p>Danny Manuel Rausseo Leon, WDD 230</p>
        <p>Last Modified: <span id="lastModified"></span></p>
    </footer>
    <script>
        document.getElementById('lastModified').textContent = document.lastModified;

        // Password validation
        const password = document.getElementById('password');
        const confirmPassword = document.getElementById('confirm-password');
        document.querySelector('form').addEventListener('submit', function(e) {
            if (password.value !== confirmPassword.value) {
                e.preventDefault();
                alert('Passwords do not match. Please try again.');
                password.value = '';
                confirmPassword.value = '';
                password.focus();
            }
        });
    </script>
</body>
</html>
